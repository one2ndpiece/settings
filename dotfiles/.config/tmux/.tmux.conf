setw -g mode-keys vi
if-shell 'test -x /root/.nix-profile/bin/zsh' 'setw -g default-shell /root/.nix-profile/bin/zsh' 'setw -g default-shell /bin/zsh'
set -g mouse on
set -g status-right "Pane: #{pane_id}"
# vi copy-mode の「ドラッグ終了(ボタンを離す)」で勝手に copy/cancel するのを無効化
unbind -T copy-mode-vi MouseDragEnd1Pane

# 念のため emacs テーブル側も潰しておく（環境によって効く側が違うと困るので）
unbind -T copy-mode MouseDragEnd1Pane

# copy-mode-vi で Ctrl+v を押すと矩形選択に切り替える
bind-key -T copy-mode-vi C-n send-keys -X rectangle-toggle

if-shell 'test -f ~/.config/tmux/clipboard-xclip.conf' 'source-file ~/.config/tmux/clipboard-xclip.conf'
