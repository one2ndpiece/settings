name: Publish Nix devcontainer image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nix-devcontainer.yaml"
      - "devcontainer/nix/image/**"
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nix-devcontainer

jobs:
  test:
    name: Test ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: devcontainer/nix/image
          file: devcontainer/nix/image/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          no-cache: true
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Smoke test
        run: |
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            --entrypoint /bin/bash \
            -v "${PWD}/devcontainer/nix/image/smoke-test.sh:/tmp/smoke-test.sh:ro" \
            "${IMAGE_NAME}@${{ steps.build.outputs.digest }}" \
            /tmp/smoke-test.sh

      - name: Export digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          test -n "${digest}"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-architecture image
    needs: test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest
        working-directory: /tmp/digests
        run: |
          shopt -s nullglob
          digests=(*)
          test "${#digests[@]}" -eq 2

          refs=()
          for digest in "${digests[@]}"; do
            refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create \
            "${refs[@]}" \
            --tag "${IMAGE_NAME}:ubuntu-24.04"
          docker buildx imagetools inspect "${IMAGE_NAME}:ubuntu-24.04"
