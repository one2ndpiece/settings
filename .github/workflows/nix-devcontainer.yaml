name: Publish Nix devcontainer image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nix-devcontainer.yaml"
      - "devcontainer/nix/image/**"
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nix-devcontainer

jobs:
  test:
    name: Test ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: devcontainer/nix/image
          file: devcontainer/nix/image/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          no-cache: true
          load: true
          tags: nix-devcontainer:test-${{ matrix.arch }}

      - name: Smoke test
        run: |
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            --entrypoint /bin/bash \
            -v "${PWD}/devcontainer/nix/image/smoke-test.sh:/tmp/smoke-test.sh:ro" \
            "nix-devcontainer:test-${{ matrix.arch }}" \
            /tmp/smoke-test.sh

  publish:
    name: Publish multi-architecture image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: devcontainer/nix/image
          file: devcontainer/nix/image/Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          no-cache: true
          push: true
          tags: ${{ env.IMAGE_NAME }}:ubuntu-24.04
